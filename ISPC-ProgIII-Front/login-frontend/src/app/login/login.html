<div class="login-container">
  <h2>Login</h2>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div>
      <label for="username">Username:</label>
      <input type="text" id="username" formControlName="username" placeholder="Ingresá tu usuario">
    </div>
    <div>
      <label for="password">Password:</label>
      <input type="password" id="password" formControlName="password" placeholder="Mínimo 8 caracteres">
    </div>
    @if (loginForm.get('password')?.errors?.['minlength'] && loginForm.get('password')?.touched) {
      <div style="color: #ff6b6b; font-size: 12px; margin-bottom: 10px;">
        La contraseña debe tener al menos 8 caracteres.
      </div>
    }
    @if (errorMessage) {
      <div style="color: #ff6b6b; margin-bottom: 10px;">
        {{ errorMessage }}
      </div>
    }
    <div class="remember-me">
      <input type="checkbox" id="rememberMe" [(ngModel)]="rememberMe" [ngModelOptions]="{standalone: true}">
      <label for="rememberMe">Recordarme</label>
    </div>
    <button type="submit" [disabled]="!loginForm.valid">Login</button>
    <a href="/forgot-password">¿Olvidaste tu contraseña?</a>
  </form>
</div>
